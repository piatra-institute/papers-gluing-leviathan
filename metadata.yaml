abstract: |-
  Civilizations assemble from local rule systems whose interfaces with one another either glue into a coherent macro-order or fail to. This paper formalises the gluing condition. A post-collapse landscape is modelled as a finite cell complex whose vertices are settlements and whose higher cells are the routes, watersheds, debts, and jurisdictions that bind them. To each region we assign a finite space of admissible institutional packages drawn from seven dimensions: property, labor, money, contract enforcement, violence, resource governance, and knowledge retention. A global section of the resulting cellular sheaf is a coherent macro-order; the first cohomology measures the obstruction to one existing globally. Above the compatibility layer sits a dynamical layer whose attractors are the historically recurrent macro-regimes: kin-commons, warlord tribute, neo-feudal land control, monastic redistribution, guild-merchant order, state-command, capitalist market order, and commons federation. A worked three-settlement river system shows that institutional repairs aimed at edges that are not the obstruction shrink the cochain spaces without buying compatibility, the kind of error reformers make routinely. A four-dimensional parameter sweep over violence, transport, energy, and literacy finds that the capitalist attractor wins 3.1% of the parameter cube, while neo-feudal and state-command together win 43.3%. Capitalism's stability is a geometric coincidence of low violence, secure transport, abundant energy, and preserved literacy. Reconstruction, on this view, is the engineering of interfaces under a parameter regime that may or may not permit the macro-order being aimed at.
